name: Publish to NuGet.org

on:
  push:
    tags:
      - "v*" # Trigger on version tags (e.g., v1.0.0)

permissions:
  id-token: write # Required for Trusted Publishing via OIDC

jobs:
  publish:
    name: Pack and publish
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/packages.lock.json', '**/Directory.Packages.props') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      # Extract version from tag (remove 'v' prefix)
      - name: Set version from tag
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_ENV

      # Pack all packages
      - name: Pack library packages
        shell: pwsh
        run: pwsh eng/scripts/pack-packages.ps1 -Version ${{ env.VERSION }}

      - name: Pack Dorn.Cli
        run: dotnet pack src/Dorn.Cli/Dorn.Cli.csproj -c Release -p:PackageVersion=${{ env.VERSION }} -o ./artifacts

      - name: Pack Dorn.Templates.WebApi
        shell: pwsh
        run: ./eng/scripts/pack-templates.ps1 -Version ${{ env.VERSION }}

      # Publish via Trusted Publishing (OIDC)
      - name: NuGet login (Trusted Publishing)
        id: login
        uses: NuGet/openidconnect@v1
        with:
          oidc_audience: api://nuget.org

      - name: Push all packages to NuGet.org
        run: >
          dotnet nuget push ./artifacts/*.nupkg
          --api-key ${{ steps.login.outputs.NUGET_API_KEY }}
          --source https://api.nuget.org/v3/index.json
          --skip-duplicate
