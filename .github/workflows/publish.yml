name: Publish to NuGet.org

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read
  id-token: write

concurrency:
  group: publish-nuget-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    name: Pack and Publish
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/packages.lock.json', '**/Directory.Packages.props') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Restore
        run: dotnet restore

      - name: Extract version from tag
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_ENV"

      - name: Build
        run: dotnet build --configuration Release --no-restore

      - name: Pack library packages
        shell: pwsh
        run: ./eng/scripts/pack-packages.ps1 -Version $env:VERSION

      - name: Pack Dorn.Cli
        run: >
          dotnet pack src/Dorn.Cli/Dorn.Cli.csproj
          --configuration Release
          --no-build
          -p:PackageVersion=${{ env.VERSION }}
          --output ./artifacts

      - name: Pack Dorn.Templates.WebApi
        shell: pwsh
        run: ./eng/scripts/pack-templates.ps1 -Version $env:VERSION

      - name: Verify generated packages
        run: |
          echo "Generated packages:"
          find artifacts -name "*.nupkg"

      - name: Login to NuGet.org (Trusted Publishing)
        id: login
        uses: NuGet/login@v1
        with:
          user: mbarretot

      - name: Publish packages
        run: |
          dotnet nuget push "./artifacts/*.nupkg" \
            --api-key "${{ steps.login.outputs.NUGET_API_KEY }}" \
            --source "https://api.nuget.org/v3/index.json" \
            --skip-duplicate \
            --force-english-output
